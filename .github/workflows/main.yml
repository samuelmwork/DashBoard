name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: freelance-dashboard/package-lock.json

    - name: Install dependencies
      run: |
        cd freelance-dashboard
        npm ci

    - name: Build
      run: |
        cd freelance-dashboard
        npm run build
